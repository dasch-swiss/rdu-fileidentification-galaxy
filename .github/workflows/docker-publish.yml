name: Publish Docker Image to Dockerhub

on:
  push:
    branches:
      - main
    paths:
      - 'fileidentification/**'
      - 'identify.py'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

jobs:
  publish-from-branch:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract version from macros.xml
        id: version
        run: |
          TOOL_VERSION=$(grep '<token name="@TOOL_VERSION@">' macros.xml | sed -E 's/.*<token name="@TOOL_VERSION@">([^<]+)<.*/\1/')
          echo "tool_version=${TOOL_VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${TOOL_VERSION}"
      - name: Login to Dockerhub
        run: echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin
      - name: Build and push multi-arch image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t daschswiss/fileidentification-galaxy:latest \
            -t daschswiss/fileidentification-galaxy:${{ steps.version.outputs.tool_version }} \
            --push \
            .
